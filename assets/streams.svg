<svg width="960" height="380" viewBox="0 0 960 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .box-base { rx: 10; stroke-width: 2; }

      /* stream glow pulses */
      @keyframes glow-blue {
        0%,100% { filter: drop-shadow(0 0 4px #4a90d9); opacity: 0.85; }
        50%      { filter: drop-shadow(0 0 12px #4a90d9); opacity: 1; }
      }
      @keyframes glow-orange {
        0%,100% { filter: drop-shadow(0 0 4px #d9784a); opacity: 0.85; }
        50%      { filter: drop-shadow(0 0 12px #d9784a); opacity: 1; }
      }
      @keyframes glow-purple {
        0%,100% { filter: drop-shadow(0 0 4px #9b6dd9); opacity: 0.85; }
        50%      { filter: drop-shadow(0 0 12px #9b6dd9); opacity: 1; }
      }
      @keyframes glow-green {
        0%,100% { filter: drop-shadow(0 0 4px #3ab56e); opacity: 0.85; }
        50%      { filter: drop-shadow(0 0 14px #3ab56e); opacity: 1; }
      }

      /* dot-flow along paths */
      @keyframes flow-dot {
        0%   { opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes dash-move {
        to { stroke-dashoffset: -24; }
      }

      /* card fade-in on load */
      @keyframes card-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .stream-spatial  { animation: glow-blue   2.4s ease-in-out infinite; }
      .stream-freq     { animation: glow-orange  2.4s ease-in-out infinite 0.8s; }
      .stream-semantic { animation: glow-purple  2.4s ease-in-out infinite 1.6s; }
      .fusion-box      { animation: glow-green   2.8s ease-in-out infinite 0.4s; }

      .flow-line {
        stroke-dasharray: 8 6;
        animation: dash-move 1.2s linear infinite;
        fill: none;
        stroke-width: 2;
      }
      .flow-line-s { stroke: #4a90d9; }
      .flow-line-f { stroke: #d9784a; animation-duration: 1.0s; }
      .flow-line-m { stroke: #9b6dd9; animation-duration: 1.4s; }
      .flow-line-out { stroke: #3ab56e; animation-duration: 0.9s; }

      .card-in-1 { animation: card-in 0.6s ease-out 0.1s both; }
      .card-in-2 { animation: card-in 0.6s ease-out 0.3s both; }
      .card-in-3 { animation: card-in 0.6s ease-out 0.5s both; }
      .card-in-4 { animation: card-in 0.6s ease-out 0.7s both; }
      .card-in-5 { animation: card-in 0.6s ease-out 0.9s both; }

      text { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>

    <marker id="arr-blue"   markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#4a90d9"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#d9784a"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#9b6dd9"/>
    </marker>
    <marker id="arr-green"  markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#3ab56e"/>
    </marker>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="960" height="380" class="bg" rx="14"/>

  <!-- subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40"  x2="960" y2="40"/>
    <line x1="0" y1="80"  x2="960" y2="80"/>
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="200" x2="960" y2="200"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="280" x2="960" y2="280"/>
    <line x1="0" y1="320" x2="960" y2="320"/>
    <line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="96"  y1="0" x2="96"  y2="380"/>
    <line x1="192" y1="0" x2="192" y2="380"/>
    <line x1="288" y1="0" x2="288" y2="380"/>
    <line x1="384" y1="0" x2="384" y2="380"/>
    <line x1="480" y1="0" x2="480" y2="380"/>
    <line x1="576" y1="0" x2="576" y2="380"/>
    <line x1="672" y1="0" x2="672" y2="380"/>
    <line x1="768" y1="0" x2="768" y2="380"/>
    <line x1="864" y1="0" x2="864" y2="380"/>
  </g>

  <!-- ── INPUT BOX ───────────────────────────────────────────── -->
  <g class="card-in-1">
    <rect x="18" y="140" width="130" height="100" rx="10" fill="#161b22" stroke="#444d56" stroke-width="1.5"/>
    <!-- face icon -->
    <circle cx="83" cy="162" r="14" fill="#21262d" stroke="#555" stroke-width="1"/>
    <circle cx="77" cy="159" r="2.5" fill="#8b949e"/>
    <circle cx="89" cy="159" r="2.5" fill="#8b949e"/>
    <path d="M76,168 Q83,174 90,168" stroke="#8b949e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="83" y="192" text-anchor="middle" font-size="11" fill="#c9d1d9" font-weight="600">Input</text>
    <text x="83" y="207" text-anchor="middle" font-size="10" fill="#6e7681">256 × 256</text>
    <text x="83" y="222" text-anchor="middle" font-size="9"  fill="#444d56">Face Image</text>
  </g>

  <!-- ── SPLIT LINES (input → 3 streams) ────────────────────── -->
  <!-- vertical splitter at x=175 -->
  <line x1="175" y1="89"  x2="175" y2="291" stroke="#2d333b" stroke-width="1.5"/>

  <!-- input → splitter -->
  <line x1="148" y1="190" x2="175" y2="190" stroke="#555" stroke-width="1.5"/>

  <!-- splitter → spatial -->
  <path class="flow-line flow-line-s" d="M175,190 L175,89 L220,89"   marker-end="url(#arr-blue)"/>
  <!-- splitter → freq -->
  <path class="flow-line flow-line-f" d="M175,190 L175,190 L220,190" marker-end="url(#arr-orange)"/>
  <!-- splitter → semantic -->
  <path class="flow-line flow-line-m" d="M175,190 L175,291 L220,291" marker-end="url(#arr-purple)"/>

  <!-- ── SPATIAL STREAM ─────────────────────────────────────── -->
  <g class="stream-spatial card-in-2">
    <rect x="220" y="40" width="200" height="100" rx="10" fill="#0d2137" stroke="#4a90d9" stroke-width="2"/>
    <text x="320" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#4a90d9">Spatial Stream</text>
    <text x="320" y="82" text-anchor="middle" font-size="10" fill="#8b949e">EfficientNet-B0  →  128-dim</text>
    <!-- feature label -->
    <rect x="235" y="90" width="170" height="38" rx="6" fill="#0a1929" stroke="#1e3a5a" stroke-width="1"/>
    <text x="320" y="106" text-anchor="middle" font-size="9" fill="#6b9fd4">Pixel texture artifacts</text>
    <text x="320" y="120" text-anchor="middle" font-size="9" fill="#6b9fd4">Boundary inconsistencies</text>
  </g>

  <!-- ── FREQUENCY STREAM ───────────────────────────────────── -->
  <g class="stream-freq card-in-3">
    <rect x="220" y="140" width="200" height="100" rx="10" fill="#2d1200" stroke="#d9784a" stroke-width="2"/>
    <text x="320" y="164" text-anchor="middle" font-size="14" font-weight="700" fill="#d9784a">Frequency Stream</text>
    <text x="320" y="182" text-anchor="middle" font-size="10" fill="#8b949e">ResNet-18 + FFT Mask  →  64-dim</text>
    <rect x="235" y="190" width="170" height="38" rx="6" fill="#1a0900" stroke="#5a2e00" stroke-width="1"/>
    <text x="320" y="206" text-anchor="middle" font-size="9" fill="#d99a6b">Spectral anomalies</text>
    <text x="320" y="220" text-anchor="middle" font-size="9" fill="#d99a6b">Periodic noise patterns</text>
  </g>

  <!-- ── SEMANTIC STREAM ────────────────────────────────────── -->
  <g class="stream-semantic card-in-4">
    <rect x="220" y="240" width="200" height="100" rx="10" fill="#160d2d" stroke="#9b6dd9" stroke-width="2"/>
    <text x="320" y="264" text-anchor="middle" font-size="14" font-weight="700" fill="#9b6dd9">Semantic Stream</text>
    <text x="320" y="282" text-anchor="middle" font-size="10" fill="#8b949e">ViT-Tiny patch16  →  384-dim</text>
    <rect x="235" y="290" width="170" height="38" rx="6" fill="#0d0820" stroke="#3a2060" stroke-width="1"/>
    <text x="320" y="306" text-anchor="middle" font-size="9" fill="#b89ee0">Global structural inconsistencies</text>
    <text x="320" y="320" text-anchor="middle" font-size="9" fill="#b89ee0">Face geometry relations</text>
  </g>

  <!-- ── STREAM → FUSION ARROWS ─────────────────────────────── -->
  <path class="flow-line flow-line-s" d="M420,90  L590,90  L590,162" marker-end="url(#arr-blue)"/>
  <path class="flow-line flow-line-f" d="M420,190 L590,190"          marker-end="url(#arr-green)"/>
  <path class="flow-line flow-line-m" d="M420,290 L590,290 L590,218" marker-end="url(#arr-purple)"/>

  <!-- ── MLAF FUSION BOX ────────────────────────────────────── -->
  <g class="fusion-box card-in-5">
    <rect x="550" y="140" width="200" height="100" rx="10" fill="#0d2d17" stroke="#3ab56e" stroke-width="2.5"/>
    <text x="650" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#3ab56e">⚡ MLAF Fusion</text>
    <text x="650" y="186" text-anchor="middle" font-size="10" fill="#8b949e">Cross-Stream Attention</text>
    <text x="650" y="202" text-anchor="middle" font-size="10" fill="#8b949e">3-token · 4 heads · 256-dim</text>
    <rect x="565" y="210" width="170" height="22" rx="5" fill="#0a1f0f" stroke="#1e4a2a" stroke-width="1"/>
    <text x="650" y="225" text-anchor="middle" font-size="9" fill="#6bcf9a">128 + 64 + 384 → 256 → P(fake)</text>
  </g>

  <!-- ── FUSION → OUTPUT ARROW ──────────────────────────────── -->
  <path class="flow-line flow-line-out" d="M750,190 L800,190" marker-end="url(#arr-green)"/>

  <!-- ── OUTPUT BOX ─────────────────────────────────────────── -->
  <g class="card-in-5">
    <rect x="800" y="148" width="138" height="84" rx="10" fill="#161b22" stroke="#3ab56e" stroke-width="1.5"/>
    <text x="869" y="174" text-anchor="middle" font-size="22">🎯</text>
    <text x="869" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#c9d1d9">P(fake)</text>
    <text x="869" y="214" text-anchor="middle" font-size="10" fill="#3ab56e">∈ [0, 1]</text>
    <text x="869" y="226" text-anchor="middle" font-size="9"  fill="#6e7681">threshold 0.5</text>
  </g>

  <!-- ── BOTTOM LEGEND ──────────────────────────────────────── -->
  <rect x="18" y="348" width="924" height="24" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <circle cx="50"  cy="360" r="5" fill="#4a90d9"/>
  <text x="60"  y="364" font-size="10" fill="#8b949e">Spatial  ·  Pixel artifacts</text>
  <circle cx="220" cy="360" r="5" fill="#d9784a"/>
  <text x="230" y="364" font-size="10" fill="#8b949e">Frequency  ·  Spectral anomalies</text>
  <circle cx="430" cy="360" r="5" fill="#9b6dd9"/>
  <text x="440" y="364" font-size="10" fill="#8b949e">Semantic  ·  Structural inconsistencies</text>
  <circle cx="660" cy="360" r="5" fill="#3ab56e"/>
  <text x="670" y="364" font-size="10" fill="#8b949e">MLAF Fusion  ·  Cross-stream attention</text>
</svg>
